name: Release

env:
  RELEASE_PDF_NAME: laamiyyah-sh-zayd.pdf

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install XeLaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-xetex \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-lang-arabic \
            texlive-pictures \
            texlive-plain-generic
          xelatex --version

      - name: Build
        run: bash ./build.sh

      - name: Rename release PDF
        run: mv build/main.pdf "build/${RELEASE_PDF_NAME}"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: build/${{ env.RELEASE_PDF_NAME }}
